<div class="header">
  <h1>Mis Favoritos</h1>
</div>

<div class="character-grid">
  @for (character of favoriteCharacters(); track character.id) {
    <app-character-card 
      [character]="character" 
      (cardClick)="openModal($event)">
    </app-character-card>
  } @empty {
    <div class="empty-state">
      <h2>Aún no tienes personajes favoritos</h2>
      <p>Ve a la lista principal y haz clic en la estrella para agregarlos.</p>
    </div>
  }
</div>

@if (isModalOpen()) {
  <app-character-modal 
    [character]="selectedCharacter()!" 
    (closeModal)="closeModal()">
  </app-character-modal>
}
